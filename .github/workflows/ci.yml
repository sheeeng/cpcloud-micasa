name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CGO_ENABLED: "0"
  TZ: UTC

jobs:
  changes:
    name: Detect Changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      go: ${{ steps.detect.outputs.go }}
      ci: ${{ steps.detect.outputs.ci }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          disable-telemetry: true
          disable-sudo-and-containers: true
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/detect-ci-changes.bash
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Check for changes
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          bash .github/detect-ci-changes.bash \
            "$EVENT_NAME" "$PR_NUMBER" "$BEFORE_SHA" "$HEAD_SHA" >> "$GITHUB_OUTPUT"

  test:
    name: Build & Test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ${{ matrix.os }}
    concurrency:
      group: ci-test-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    strategy:
      fail-fast: ${{ github.event_name == 'pull_request' }}
      matrix:
        os:
          - blacksmith-4vcpu-ubuntu-2404
          - blacksmith-4vcpu-ubuntu-2404-arm
          - macos-latest
          - windows-latest
          - windows-11-arm
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          disable-telemetry: true
          allowed-endpoints: >
            api.github.com:443
            api.zippopotam.us:443
            azure.archive.ubuntu.com:80
            esm.ubuntu.com:443
            github.com:443
            packages.microsoft.com:443
            ports.ubuntu.com:80
            proxy.golang.org:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Install extraction tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y poppler-utils tesseract-ocr imagemagick

      - name: Symlink magick to convert (Linux)
        if: runner.os == 'Linux'
        run: command -v magick || sudo ln -s "$(command -v convert)" /usr/local/bin/magick

      - name: Install extraction tools (macOS)
        if: runner.os == 'macOS'
        run: brew install poppler tesseract imagemagick-full ghostscript

      - name: Add imagemagick-full to PATH (macOS)
        if: runner.os == 'macOS'
        run: echo "$(brew --prefix imagemagick-full)/bin" >> "$GITHUB_PATH"

      # Microsoft.DesktopAppInstaller_8wekyb3d8bbwe is the package family
      # name for winget in the Windows Store.
      - name: Configure winget (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $settingsDir = "$env:LOCALAPPDATA\Packages\Microsoft.DesktopAppInstaller_8wekyb3d8bbwe\LocalState"
          New-Item -ItemType Directory -Path $settingsDir -Force | Out-Null
          Copy-Item .github\winget-settings.json "$settingsDir\settings.json"

      - name: Install extraction tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $flags = @('--accept-source-agreements', '--accept-package-agreements', '--disable-interactivity', '--silent', '--force')
          winget install --id oschwartz10612.Poppler @flags
          winget install --id tesseract-ocr.tesseract @flags
          winget install --id ImageMagick.ImageMagick @flags

      - name: Add extraction tools to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_PATH "$env:LOCALAPPDATA\Microsoft\WinGet\Links"
          Get-ChildItem "$env:LOCALAPPDATA\Microsoft\WinGet\Packages\oschwartz10612.Poppler_*\poppler-*\Library\bin" |
            Select-Object -First 1 -ExpandProperty FullName |
            Add-Content $env:GITHUB_PATH
          Add-Content $env:GITHUB_PATH "$env:ProgramFiles\Tesseract-OCR"
          Get-ChildItem "$env:ProgramFiles\ImageMagick-*" -Directory |
            Select-Object -First 1 -ExpandProperty FullName |
            Add-Content $env:GITHUB_PATH

      - name: Generate sample PDF fixture
        shell: bash
        run: bash internal/extract/gen-sample-pdf.bash

      - name: Generate invoice PNG fixture
        shell: bash
        run: bash internal/extract/gen-invoice-png.bash

      - name: Generate sample text PNG fixture
        shell: bash
        run: bash internal/extract/gen-sample-text-png.bash

      - name: Generate scanned PDF fixture
        shell: bash
        run: bash internal/extract/gen-scanned-pdf.bash

      - name: Generate mixed PDF fixture
        shell: bash
        run: bash internal/extract/gen-mixed-pdf.bash

      - name: Build
        run: go build ./cmd/micasa

      - name: Test
        if: runner.os != 'Windows' || runner.arch != 'ARM64'
        env:
          CGO_ENABLED: "1"
          MICASA_TEST_SEED: ${{ github.run_id }}
        run: go test -race -shuffle on -timeout 5m ./...

      - name: Test (no race)
        if: runner.os == 'Windows' && runner.arch == 'ARM64'
        env:
          MICASA_TEST_SEED: ${{ github.run_id }}
        run: go test -shuffle on -timeout 5m ./...

  pgtest:
    name: Postgres Integration (${{ matrix.variant }})
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      matrix:
        include:
          - variant: debian
            image: postgres@sha256:b994732fcf33f73776c65d3a5bf1f80c00120ba5007e8ab90307b1a743c1fc16 # 17
          - variant: alpine
            image: postgres@sha256:6f30057d31f5861b66f3545d4821f987aacf1dd920765f0acadea0c58ff975b1 # 17-alpine
    concurrency:
      group: ci-pgtest-${{ matrix.variant }}-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    services:
      postgres:
        image: ${{ matrix.image }}
        env:
          POSTGRES_USER: micasa
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: micasa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U micasa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          disable-telemetry: true
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            proxy.golang.org:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Test relay (with Postgres)
        env:
          CGO_ENABLED: "1"
          RELAY_POSTGRES_DSN: "postgres://micasa:testpass@localhost:5432/micasa_test?sslmode=disable"
        run: go test -race -shuffle on -timeout 5m ./internal/relay/

      - name: Test sync round-trip (with Postgres)
        env:
          CGO_ENABLED: "1"
          RELAY_POSTGRES_DSN: "postgres://micasa:testpass@localhost:5432/micasa_test?sslmode=disable"
        run: go test -race -shuffle on -timeout 5m -run TestSyncRoundTripPgStore ./internal/sync/

  benchmarks:
    name: Benchmarks (smoke)
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    concurrency:
      group: ci-benchmarks-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          disable-telemetry: true
          disable-sudo-and-containers: true
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            proxy.golang.org:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Run smoke benchmarks
        run: go test -bench . -benchtime 1x -timeout 5m -run '^$' ./...

  nix-build:
    name: Nix Build
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    concurrency:
      group: ci-nix-build-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          disable-telemetry: true
          allowed-endpoints: >
            api.github.com:443
            cache.nixos.org:443
            github.com:443
            proxy.golang.org:443
            release-assets.githubusercontent.com:443
            releases.nixos.org:443
            storage.googleapis.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3

      - name: Build with Nix
        run: nix build '.#micasa'

  docs:
    name: Docs Build
    needs: changes
    if: needs.changes.outputs.ci == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    concurrency:
      group: ci-docs-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          disable-telemetry: true
          allowed-endpoints: >
            api.github.com:443
            cache.nixos.org:443
            github.com:443
            releases.nixos.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3

      - name: Build docs
        run: nix run '.#docs'

  # ---------------------------------------------------------------------------
  # Semantic Release (dry-run on PRs to exercise the full release pipeline)
  # ---------------------------------------------------------------------------

  semantic-release-dry-run:
    name: Semantic Release (dry-run)
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.ci == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          disable-telemetry: true
          disable-sudo-and-containers: true
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            registry.npmjs.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*

      - name: Simulate release (dry-run)
        run: bash ci/release/dry-run.bash

  docker-build:
    name: Docker Build
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    concurrency:
      group: ci-docker-build-${{ matrix.build_tags }}-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    strategy:
      matrix:
        build_tags: ["", "selfhosted"]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          disable-telemetry: true
          allowed-endpoints: >
            api.github.com:443
            auth.docker.io:443
            github.com:443
            gcr.io:443
            production.cloudflare.docker.com:443
            proxy.golang.org:443
            registry-1.docker.io:443
            storage.googleapis.com:443
            sum.golang.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@5241b2e9423e8b1fa37ed6050ecb62d0fb9a4e38 # v1

      - name: Build relay image${{ matrix.build_tags && format(' ({0})', matrix.build_tags) }}
        run: docker build --build-arg BUILD_TAGS=${{ matrix.build_tags }} -f deploy/relay/Dockerfile .

  # ---------------------------------------------------------------------------
  # Gate: single required check that rolls up all jobs above.
  # Ruleset requires "CI Result", "Lint Result", "Security Result".
  # ---------------------------------------------------------------------------

  result:
    name: CI Result
    if: always()
    needs: [changes, test, pgtest, benchmarks, nix-build, docs, semantic-release-dry-run, docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          disable-telemetry: true
          disable-sudo-and-containers: true
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
