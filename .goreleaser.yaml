version: 2

builds:
  - main: ./cmd/micasa
    binary: micasa
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "micasa_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  disable: true

dockers_v2:
  - images:
      - "ghcr.io/cpcloud/micasa"
    tags:
      - "{{ .Version }}"
      - "{{ .Major }}.{{ .Minor }}"
      - "{{ .Major }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: false
    flags:
      - "--provenance=false"
    labels:
      "org.opencontainers.image.title": micasa
      "org.opencontainers.image.description": Terminal UI for managing home projects and maintenance
      "org.opencontainers.image.source": https://github.com/cpcloud/micasa
      "org.opencontainers.image.url": https://micasa.dev
      "org.opencontainers.image.documentation": https://micasa.dev/docs/
      "org.opencontainers.image.licenses": Apache-2.0
      "org.opencontainers.image.version": "{{ .Version }}"
    annotations:
      "org.opencontainers.image.title": micasa
      "org.opencontainers.image.description": Terminal UI for managing home projects and maintenance
      "org.opencontainers.image.source": https://github.com/cpcloud/micasa
      "org.opencontainers.image.url": https://micasa.dev
      "org.opencontainers.image.documentation": https://micasa.dev/docs/
      "org.opencontainers.image.licenses": Apache-2.0
      "org.opencontainers.image.version": "{{ .Version }}"

release:
  mode: keep-existing
