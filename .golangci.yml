version: "2"

linters:
  enable:
    # Type safety
    - forcetypeassert
    - unconvert
    - asasalint

    # Error handling
    - errorlint
    - errchkjson

    # Bug prevention
    - govet
    - gocritic
    - gosec
    - durationcheck
    - exhaustive
    - fatcontext
    - copyloopvar

    # Resource & network safety
    - sqlclosecheck
    - bodyclose
    - nilerr
    - rowserrcheck
    - noctx

    # Dead code
    - unused
    - wastedassign

    # Code quality
    - goconst
    - dupword
    - asciicheck
    - revive
    - testifylint
    - intrange
    - wrapcheck
    - musttag

  settings:
    exhaustive:
      default-signifies-exhaustive: false

    goconst:
      min-occurrences: 5

    revive:
      enable-default-rules: true
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

    wrapcheck:
      ignore-package-globs:
        - github.com/micasa-dev/micasa/*
        - database/sql
        - database/sql/*
        - gorm.io/gorm
        - gorm.io/gorm/*

    testifylint:
      disable:
        - suite-broken-parallel # Our suites capture t := s.T() before Parallel()

    gocritic:
      enable-all: true
      disabled-tags:
        - experimental
        - opinionated
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - ifElseChain
        - singleCaseSwitch

  exclusions:
    rules:
      # staticcheck nil-after-Fatal false positives in tests
      - linters: [staticcheck]
        path: _test\.go
        text: "SA5011"

      # gosec G204/G704: test binaries and URLs are controlled, not user input
      - linters: [gosec]
        path: _test\.go
        text: "G204|G704"

      # goconst: repeated strings in tests are fine
      - linters: [goconst]
        path: _test\.go
